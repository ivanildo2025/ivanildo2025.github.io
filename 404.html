<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivanildo · Página não encontrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #1e293b;
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        :root {
            --primary: #0f2b45;
            --accent: #c19a5b;
            --gray-600: #475569;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
        }
        .logo span {
            color: var(--accent);
            font-weight: 300;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 4px 4px 0 rgba(193,154,91,0.2);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        p {
            color: var(--gray-600);
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.1s;
            border: 1px solid transparent;
            font-size: 1.1rem;
        }
        .btn:hover {
            background-color: #1e4a6f;
            transform: scale(1.02);
        }
        .btn i {
            margin-right: 0.5rem;
        }
        footer {
            background-color: var(--primary);
            color: #e2e8f0;
            padding: 1.5rem 0;
            text-align: center;
            font-size: 0.95rem;
        }
        footer a {
            color: #f3f4f6;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        footer a:hover {
            color: var(--accent);
        }
        #copyright-year {
            font-weight: 600;
            color: white;
        }
        @media (max-width: 600px) {
            .error-code { font-size: 6rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Ivanildo<span>.</span></div>
        <div class="error-code">404</div>
        <h1>Página não encontrada</h1>
        <p>Parece que o link que você seguiu não existe ou foi movido.<br>Que tal voltar para a página inicial?</p>
        <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Voltar ao início</a>
    </div>

    <footer>
        <div>© <span id="copyright-year"></span> Ivanildo. Todos os direitos reservados.</div>
        <div style="margin-top: 0.3rem;">ivanildo.com.br</div>
    </footer>

    <script>
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
