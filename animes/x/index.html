<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Links a partir de CSV</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        ul { list-style: none; padding: 0; }
        li { margin: 5px 0; }
        a { text-decoration: none; color: #0066cc; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Links do arquivo lista.csv</h1>
    <ul id="listaLinks"></ul>
    <p id="mensagem"></p>

    <script>
        fetch('./lista.csv')
            .then(response => {
                if (!response.ok) throw new Error('Arquivo não encontrado');
                return response.text();
            })
            .then(conteudo => {
                const lista = document.getElementById('listaLinks');
                const linhas = conteudo.split('\n').filter(l => l.trim() !== '');
                let total = 0;

                linhas.forEach(linha => {
                    const partes = linha.split('|').map(s => s.trim());
                    if (partes.length >= 2) {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = partes[0];
                        a.textContent = partes[1];
                        a.target = '_blank';
                        li.appendChild(a);
                        lista.appendChild(li);
                        total++;
                    }
                });

                document.getElementById('mensagem').textContent = 
                    total > 0 ? `${total} link(s) carregado(s).` : 'Nenhum link válido encontrado.';
            })
            .catch(erro => {
                document.getElementById('mensagem').textContent = 'Erro ao carregar lista.csv: ' + erro.message;
            });
    </script>
</body>
</html>
